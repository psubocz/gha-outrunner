name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install package signing tools
        run: sudo apt-get update && sudo apt-get install -y rpm devscripts

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GPG_SIGNING_KEY }}" | gpg --batch --import
          echo "${{ secrets.GPG_SIGNING_KEY }}" > /tmp/gpg-signing-key.asc

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}

      - name: Update Homebrew formula
        run: scripts/update-homebrew.sh
        env:
          VERSION: ${{ github.ref_name }}
          CHECKSUMS_FILE: dist/checksums.txt
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
