# Windows VM via libvirt/QEMU.
# Requires: libvirtd running, qcow2 golden image with QEMU Guest Agent.
url: https://github.com/your-org/your-repo
# token_file: /etc/outrunner/token

runners:
  windows:
    labels: [self-hosted, windows, x64]
    max_runners: 1
    libvirt:
      path: /var/lib/libvirt/images/ci-runners/windows-builder.qcow2
      runner_cmd: 'C:\actions-runner\run.cmd'
      cpus: 4
      memory: 8192
