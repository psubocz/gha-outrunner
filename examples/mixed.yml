# All three backends in one config.
# Each runner gets its own scale set. GitHub routes jobs by label matching.
url: https://github.com/your-org/your-repo
# token_file: /etc/outrunner/token

runners:
  linux:
    labels: [self-hosted, linux, x64]
    max_runners: 4
    docker:
      image: outrunner-runner:latest

  windows:
    labels: [self-hosted, windows, x64]
    max_runners: 1
    libvirt:
      path: /var/lib/libvirt/images/ci-runners/windows-builder.qcow2
      runner_cmd: 'C:\actions-runner\run.cmd'
      cpus: 4
      memory: 8192

  macos:
    labels: [self-hosted, macos, arm64]
    max_runners: 1
    tart:
      image: ghcr.io/cirruslabs/macos-sequoia-base:latest
      runner_cmd: /actions-runner/run.sh
      cpus: 4
      memory: 8192
