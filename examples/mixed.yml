# All three backends in one config.
# outrunner routes each job to the right provisioner based on labels.
images:
  - label: linux
    docker:
      image: outrunner-runner:latest

  - label: windows
    libvirt:
      path: /var/lib/libvirt/images/ci-runners/windows-builder.qcow2
      runner_cmd: 'C:\actions-runner\run.cmd'
      cpus: 4
      memory: 8192

  - label: macos
    tart:
      image: ghcr.io/cirruslabs/macos-sequoia-base:latest
      runner_cmd: /actions-runner/run.sh
      cpus: 4
      memory: 8192
