version: 2

builds:
  - main: ./cmd/outrunner
    binary: outrunner
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64

archives:
  - formats:
      - tar.gz

nfpms:
  - package_name: outrunner
    maintainer: NetwindHQ <https://github.com/NetwindHQ>
    vendor: NetwindHQ
    homepage: https://github.com/NetwindHQ/gha-outrunner
    description: Ephemeral GitHub Actions runners, no Kubernetes required
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: packaging/outrunner.service
        dst: /lib/systemd/system/outrunner.service
      - src: packaging/config.yml
        dst: /etc/outrunner/config.yml
        type: "config|noreplace"
      - dst: /etc/outrunner
        type: dir
        file_info:
          mode: 0750
          owner: outrunner
          group: outrunner
    scripts:
      postinstall: scripts/postinstall.sh
      preremove: scripts/preremove.sh

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
