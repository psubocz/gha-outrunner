# outrunner configuration
# See https://github.com/NetwindHQ/gha-outrunner/blob/main/docs/reference/configuration.md
#
# Quick setup:
#   1. Set the url below to your GitHub repository or organization
#   2. Provide a token (see options below)
#   3. Uncomment the runners section and adjust to your needs
#   4. Start the service: sudo systemctl start outrunner

url: https://github.com/your-org/your-repo

# Token is read from (in order of precedence):
# 1. --token CLI flag
# 2. GITHUB_TOKEN environment variable (set in /etc/outrunner/env)
# 3. systemd-creds ($CREDENTIALS_DIRECTORY/github-token)
# 4. token_file below
#
# Simplest option — create a token file:
#   echo -n "ghp_YOUR_TOKEN" | sudo tee /etc/outrunner/token
#   sudo chmod 600 /etc/outrunner/token && sudo chown outrunner:outrunner /etc/outrunner/token
token_file: /etc/outrunner/token

# Uncomment and adjust the runners section below.
# Each entry creates a scale set that GitHub routes jobs to based on labels.
# runners:
#   linux:
#     labels: [self-hosted, linux]
#     docker:
#       image: ghcr.io/actions/actions-runner:latest
